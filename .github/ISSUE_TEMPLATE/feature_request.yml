name: Feature request
description: Suggest a new feature, game, or improvement
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: check [open issues](https://github.com/alanbato/tuimanji/issues)
        for existing requests. For new games, this is the right place — call
        out any unusual rules or multi-phase mechanics so scope is clear.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The user need, pain point, or gap you've hit.
      placeholder: I want to play Go but there's no module for it yet.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you'd like tuimanji to behave. Be concrete.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why you rejected them.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      description: Check all that apply.
      options:
        - label: New game
        - label: CLI / command change
        - label: UI / rendering improvement
        - label: Store / concurrency / persistence
        - label: Docs / developer experience
        - label: Other
